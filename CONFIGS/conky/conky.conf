conky.config = {
  background = true,
  update_interval = 2,
  double_buffer = true,
  own_window = true,
  own_window_type = 'desktop',
  own_window_argb_visual = true,
  own_window_argb_value = 120,
  own_window_hints = 'undecorated,sticky,skip_taskbar,skip_pager,below',
  border_width = 0,
  default_color = '#abb2bf',
  default_outline_color = '#282c34',
  default_shade_color = '#282c34',
  draw_borders = false,
  draw_outline = false,
  draw_shades = false,
  use_xft = true,
  font = 'Hack Nerd Font:size=10',
  xinerama_head = 1,
  alignment = 'top_right',
  gap_x = 15,
  gap_y = 58,
  minimum_width = 250,
  maximum_width = 250,
};

conky.text = [[
${color #61afef}${font Hack Nerd Font:size=12} SYSTEM${font}${color}
${voffset 4}${hr 2}
${color #e5c07b}OS:${color} ${alignr}${sysname} ${kernel}
${color #e5c07b}Uptime:${color} ${alignr}${uptime}
${color #e5c07b}CPU:${color} ${alignr}${cpu}%
${color #e5c07b}RAM:${color} ${alignr}${memperc}% (${mem})
${color #e5c07b}Disk:${color} ${alignr}${fs_used_perc /}% (${fs_used /}/${fs_size /})
${color #e5c07b}Processes:${color} ${alignr}${processes}

${color #61afef}${font Hack Nerd Font:size=12} VOLUME${font}${color}
${voffset 4}${hr 2}
${color #e5c07b}Master:${color} ${alignr}${exec amixer get Master | grep -oP '\\d+%' | head -1}

${color #61afef}${font Hack Nerd Font:size=12} NETWORK${font}${color}
${voffset 4}${hr 2}
${color #e5c07b}IP:${color} ${alignr}${addr wlan0}${if_existing /sys/class/net/wlan0/operstate up}${endif}
${color #e5c07b}VPN:${color} ${alignr}${if_existing /sys/class/net/tun0/operstate up}Connected${else}Disconnected${endif}

${color #61afef}${font Hack Nerd Font:size=12} DATE${font}${color}
${voffset 4}${hr 2}
${color #e5c07b}Time:${color} ${alignr}${time %H:%M:%S}
${color #e5c07b}Date:${color} ${alignr}${time %A, %d %B %Y}
]];
