backend = "xrender";
vsync = false;

# Shadows
shadow = true;
shadow-radius = 12;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.3;
shadow-red = 0.0;
shadow-green = 0.0;
shadow-blue = 0.0;
shadow-exclude = [
  "name = 'polybar-main*'",
  "name = 'Polybar tray window'",
  "class_g = 'firefox' && argb",
  "class_g = 'rofi'",
];

# Fading
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 2;

# Opacity
inactive-opacity = 0.9;
frame-opacity = 1.0;
active-opacity = 1.0;

# Opacity rules
opacity-rule = [
  "80:class_g = 'kitty' && focused",
  "90:class_g = 'kitty' && !focused",
];

# Corners
corner-radius = 0;

# Blur (disabled for xrender compatibility)
# blur-method = "dual_kawase";
# blur-size = 8;
# blur-background = false;

blur-background-exclude = [
  "class_g = 'rofi'",
];

# Windows to exclude
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.85; focus = false; };
  dock = { shadow = false; };
  dropdown_menu = { shadow = true; };
  popup_menu = { shadow = true; };
};
